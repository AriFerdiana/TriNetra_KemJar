name: NetraSphere DevSecOps Pipeline

# Pipeline berjalan setiap kali ada push atau Pull Request ke branch main
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ==========================================
  # JOB 1: SAST & DEPENDENCY SECURITY SCANNING
  # ==========================================
  security-scan:
    name: Code & Dependency Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 1. OWASP Dependency Check
      # Memeriksa apakah ada library (di pom.xml) yang memiliki CVE (Celah Keamanan Publik)
      - name: Run OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7
        continue-on-error: true # Ganti jadi false di production agar pipeline gagal jika ada kerentanan tinggi

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html

  # ==========================================
  # JOB 2: CONTAINER SECURITY (IMAGE SCANNING)
  # ==========================================
  container-scan:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: security-scan # Dijalankan setelah pengecekan kode selesai
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Build Image menggunakan Dockerfile yang baru kita buat
      - name: Build Docker Image
        run: docker build -t trinetra/smartwaste:latest .

      # 3. TRIVY VULNERABILITY SCANNER
      # Memeriksa celah keamanan OS Alpine dan komponen di dalam container
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'trinetra/smartwaste:latest'
          format: 'table'
          exit-code: '1'          # Gagal build jika celah ditemukan
          ignore-unfixed: true    # Abaikan bug yang belum ada perbaikannya
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH' # Hanya laporkan celah sangat berbahaya

