server {
    listen 80;
    server_name localhost;

    # WAF Sederhana: Menyembunyikan versi Nginx (mencegah enumerasi hacker)
    server_tokens off;

    # WAF Sederhana: Hanya izinkan HTTP Methods yang umum, tolak TRACE/TRACK/CONNECT
    if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS)$ ) {
        return 405;
    }

    # Security Headers Layer Nginx (sebagai double proteksi selain dari Spring Boot)
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Maksimal ukuran file upload di-handle oleh proxy (mencegah DoS file besar)
    client_max_body_size 6M;

    # Proxy koneksi ke backend Spring Boot (yang tersembunyi di port 8081 internal)
    location / {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (jika aplikasi Anda menggunakan STOMP/Websocket)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
