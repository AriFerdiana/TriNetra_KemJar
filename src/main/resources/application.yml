spring:
  application:
    name: smart-waste-system

  # ===== DATABASE CONFIGURATION =====
  datasource:
    url: jdbc:mysql://localhost:3306/db_tubes_pbo_trinetra?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: SmartWasteHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ===== JPA / HIBERNATE CONFIGURATION =====
  jpa:
    hibernate:
      ddl-auto: update          # Otomatis update schema (gunakan 'validate' di production)
    show-sql: true
    open-in-view: true          # Enable OSIV for Thymeleaf rendering
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        globally_quoted_identifiers: false

  # ===== THYMELEAF CONFIGURATION =====
  thymeleaf:
    cache: false                # Set true saat production
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

  # ===== JACKSON / JSON CONFIGURATION =====
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Jakarta
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # ===== MAIL CONFIGURATION (FOR PASSWORD RESET) =====
  mail:
    host: smtp.gmail.com
    port: 587
    username: YOUR_EMAIL@gmail.com
    password: YOUR_APP_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ===== SERVER CONFIGURATION =====
server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# ===== CUSTOM APPLICATION PROPERTIES =====
app:
  # JWT Configuration
  jwt:
    secret: SmartWasteTrinetra_SecretKey_2024_PBO_UNIV_256BitsMinimumHMACStr!ngLength
    expiration: 86400000          # 24 jam dalam milidetik
    refresh-expiration: 604800000 # 7 hari dalam milidetik

  # Mistral AI Integration
  mistral:
    api-key: WnQAuvwg4Ykz71Mmxj7DgeUcF5RIAIml
    base-url: https://api.mistral.ai/v1
    model: mistral-small-latest
    max-tokens: 512
    temperature: 0.7
    system-prompt: >
      Kamu adalah asisten AI untuk Sistem Pengelolaan Sampah Komunitas Cerdas.
      Tugasmu adalah membantu warga tentang kategori sampah, panduan daur ulang,
      estimasi poin Green Wallet, dan jadwal pengumpulan sampah.
      Jawab selalu dalam Bahasa Indonesia dengan ramah dan informatif.

  # IoT Device Authentication
  iot:
    api-key: IOT-TRINETRA-NETRADUMP-2024-SECRET
    allowed-device-prefix: NETRADUMP

  # Pagination defaults
  pagination:
    default-page-size: 10
    max-page-size: 100

  # File Upload Configuration
  upload:
    dir: uploads/

# ===== LOGGING CONFIGURATION =====
logging:
  level:
    com.smartwaste: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ===== SPRINGDOC OPENAPI (SWAGGER) =====
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    filter: true
  info:
    title: Smart Community Waste System API
    description: >
      REST API untuk Sistem Pengelolaan Sampah Komunitas Cerdas.
      Mendukung RBAC (Admin/Citizen/Collector), Gamifikasi Green Wallet,
      IoT Integration Endpoint, dan AI Chatbot Mistral.
    version: 1.0.0
