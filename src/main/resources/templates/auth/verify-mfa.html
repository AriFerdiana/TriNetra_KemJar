<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi 2FA — Smart Waste System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; }
        .verify-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .otp-input { font-size: 2rem; letter-spacing: 12px; text-align: center; font-weight: bold; background: rgba(255,255,255,0.08) !important; border: 2px solid rgba(255,255,255,0.2) !important; color: white !important; border-radius: 12px !important; }
        .otp-input:focus { border-color: #4ade80 !important; box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.15) !important; }
        .otp-input::placeholder { color: rgba(255,255,255,0.3) !important; letter-spacing: 4px; }
        .btn-verify { background: linear-gradient(135deg, #4ade80, #22c55e); color: #1a1a2e; font-weight: 700; border: none; border-radius: 10px; padding: 14px; font-size: 1.05rem; transition: all 0.3s; }
        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(74, 222, 128, 0.4); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="verify-card p-5 text-center">

                <!-- Icon -->
                <div class="mb-4 pulse">
                    <span class="fa-stack fa-2x">
                        <i class="fas fa-circle fa-stack-2x" style="color: rgba(74,222,128,0.15);"></i>
                        <i class="fas fa-mobile-screen-button fa-stack-1x" style="color: #4ade80;"></i>
                    </span>
                </div>

                <h4 class="text-white fw-bold mb-1">Verifikasi Identitas</h4>
                <p class="text-white-50 mb-4">
                    Masukkan kode 6-digit dari aplikasi<br>
                    <strong class="text-white">Google Authenticator</strong> di smartphone Anda
                </p>

                <!-- Error Alert -->
                <div th:if="${errorMessage}" class="alert alert-danger border-0 rounded-3 text-start mb-4" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <span th:text="${errorMessage}"></span>
                </div>

                <!-- OTP Form -->
                <form th:action="@{/mfa/verify}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="email" th:value="${email}">

                    <div class="mb-4">
                        <input type="text"
                               id="otpCode"
                               name="otpCode"
                               class="form-control otp-input py-3"
                               placeholder="· · · · · ·"
                               maxlength="6"
                               pattern="[0-9]{6}"
                               required
                               autofocus
                               autocomplete="one-time-code">
                    </div>

                    <button type="submit" class="btn btn-verify w-100 mb-3">
                        <i class="fas fa-check me-2"></i>Verifikasi
                    </button>
                </form>

                <!-- Info -->
                <div class="text-white-50 small">
                    <i class="fas fa-clock me-1"></i>
                    Kode berlaku selama <strong class="text-white">30 detik</strong>.
                    Tunggu kode baru jika sudah expired.
                </div>

                <hr style="border-color: rgba(255,255,255,0.1);" class="my-4">

                <a th:href="@{/auth/logout}" class="text-white-50 text-decoration-none small">
                    <i class="fas fa-arrow-left me-1"></i>Kembali ke Login
                </a>

            </div>
        </div>
    </div>
</div>

<script>
    // Auto-format: hanya angka, dan auto-submit saat 6 digit
    const otpInput = document.getElementById('otpCode');
    otpInput.addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '');
        if (this.value.length === 6) {
            this.closest('form').submit();
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
