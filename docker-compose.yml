version: '3.8'

services:
  # ==========================================
  # SERVICE 0: NGINX REVERSE PROXY (SINGLE ENTRY POINT)
  # ==========================================
  # Ini adalah "Satpam" satu-satunya. Publik hanya bisa menyentuh Nginx.
  proxy:
    image: nginx:alpine
    container_name: smartwaste-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - smartwaste-net
    depends_on:
      - backend

  # ==========================================
  # SERVICE 1: SMART WASTE BACKEND (SPRING BOOT)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartwaste-app
    image: trinetra/smartwaste:latest
    restart: always
    # SECURITY: Port 8081 sekarang hanya di-expose ke internal network (Nginx). 
    # Publik tidak bisa mengakses IP:8081 lagi.
    expose:
      - "8081"
    environment:
      # Override properties di application.yml agar mengarah ke container DB
      - SPRING_DATASOURCE_URL=jdbc:mysql://database:3306/db_tubes_pbo_trinetra?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SEED_DUMMY_DATA=${SEED_DUMMY_DATA}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - IOT_API_KEY=${IOT_API_KEY}
      - AES_SECRET_KEY=${AES_SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      # Redis juga diarahkan ke container internal jika dibutuhkan
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      database:
        condition: service_healthy
    networks:
      - smartwaste-net
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  # ==========================================
  # SERVICE 2: DATABASE (MYSQL)
  # ==========================================
  database:
    image: mysql:8.0
    container_name: smartwaste-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=db_tubes_pbo_trinetra
    # SECURITY: Port 3306 TIDAK di-expose ke host (internet/publik). 
    # Hanya 'backend' yang bisa mengakses ini lewat network internal Docker.
    expose:
      - "3306"
    networks:
      - smartwaste-net
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # ==========================================
  # SERVICE 3: REDIS (UNTUK RATE LIMITING)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: smartwaste-redis
    restart: always
    # SECURITY: Port Redis juga tidak di-expose keluar
    expose:
      - "6379"
    networks:
      - smartwaste-net
    volumes:
      - redis-data:/data

# ==========================================
# VOLUMES & NETWORKS (ISOLATION)
# ==========================================
volumes:
  db-data:
  redis-data:

networks:
  smartwaste-net:
    driver: bridge
